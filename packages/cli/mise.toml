[env]
_.path = './node_modules/.bin'

[tasks]
check = ['tsc -b tsconfig.json', 'biome check']
publish = [
  'bun pm pack',
  'npm publish *.tgz',
  'echo "New tag: @context0/cli@$(node -p "require(\"./package.json\").version")"',
]

[tasks.build]
depends = "//packages/core:build"
run = 'tsc -b tsconfig.json'

[tasks.dist]
depends = ':build'
run = [
  "bun build ./src/bin/cli.ts --outdir ./dist --target node",
  "chmod +x ./dist/cli.js",
]
